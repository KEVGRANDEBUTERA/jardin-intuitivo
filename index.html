<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jardín Intuitivo - Conectado</title>
    <!-- ✅ CDN PHASER CORRECTO -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #2e7d32; overflow: hidden; height: 100vh; }
        
        /* 🌸 LOGIN / ENTRADA */
        #pantalla-login {
            position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px);
        }
        .login-box {
            background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #ccc; width: 80%; }
        
        /* 🌿 JUEGO */
        #juego-contenedor { 
            display: none; 
            text-align: center; 
            padding-top: 20px; 
            width: 100%; 
            height: 100vh;
        }
        #game-container { 
            width: 800px; 
            height: 500px; 
            margin: 20px auto; 
            border: 5px solid white; 
            border-radius: 20px; 
            background: rgba(255,255,255,0.1);
        }
        
        .controles { margin-top: 20px; }
        button { 
            padding: 15px 30px; 
            border-radius: 50px; 
            border: none; 
            background: #2e7d32; 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            transition: 0.3s; 
            margin: 5px;
        }
        button:hover { transform: scale(1.1); background: #388e3c; }

        /* 🍃 HOJAS */
        .petalo { 
            position: fixed; 
            top: -50px; 
            width: 30px; 
            height: 30px; 
            background: #90ee90; 
            border-radius: 50%; 
            animation: caer linear infinite; 
            pointer-events: none; 
            z-index: 50; 
            opacity: 0.7;
        }
        @keyframes caer { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

    <!-- 🌸 LOGIN -->
    <div id="pantalla-login">
        <div class="login-box">
            <h2>🌱 Bienvenido al Jardín</h2>
            <p>Introduce tu nombre de jardinero:</p>
            <input type="text" id="nombreUsuario" placeholder="Tu nombre...">
            <br>
            <button onclick="entrarAlJardin()">✨ ENTRAR</button>
        </div>
    </div>

    <!-- 🌿 JARDÍN -->
    <div id="juego-contenedor">
        <h1 style="color: white; margin-top: 10px;">🌸 Mi Jardín 🌸</h1>
        <div id="game-container"></div>
        <div class="controles">
            <button onclick="accion('agua')">💧 Regar</button>
            <button onclick="accion('sol')">☀️ Sol</button>
            <button onclick="accion('abono')">🌿 Abono</button>
        </div>
    </div>

    <script>
        // 1. LÓGICA DE LOGIN
        function entrarAlJardin() {
            let nombre = document.getElementById('nombreUsuario').value;
            if(nombre.length > 2) {
                document.getElementById('pantalla-login').style.display = 'none';
                document.getElementById('juego-contenedor').style.display = 'block';
                setTimeout(iniciarPhaser, 100); // ✅ Esperar a que el contenedor sea visible
            } else {
                alert("Por favor, escribe un nombre válido.");
            }
        }

        // 2. PARTÍCULAS (Hojas)
        setInterval(() => {
            let p = document.createElement("div"); 
            p.className = "petalo";
            p.style.left = Math.random() * window.innerWidth + "px";
            p.style.animationDuration = (4 + Math.random() * 4) + "s";
            document.body.appendChild(p); 
            setTimeout(() => p.remove(), 8000);
        }, 500);

        // 3. VARIABLES GLOBALES
        var estado = { agua: 0, sol: 0, abono: 0 };
        var flores = [];
        var escena = null;

        // 4. JUEGO PHASER
        function iniciarPhaser() {
            const config = {
                type: Phaser.AUTO,
                parent: 'game-container',
                width: 800,
                height: 500,
                transparent: true,
                scene: {
                    create: create,
                    update: update
                }
            };
            const game = new Phaser.Game(config);
        }

        function create() {
            escena = this;
            const colores = [0xffff00, 0xff4444, 0xff00ff]; // Amarillo, Rojo, Rosa
            const nombres = ["Rosa", "Clavel", "Tulipán"];
            
            for(let i = 0; i < 3; i++) {
                let container = this.add.container(150 + (i * 250), 400);
                
                // Tallo verde
                let tallo = this.add.rectangle(0, 0, 15, 100, 0x388e3c).setOrigin(0.5, 1);
                
                // Pétalos (Círculos grandes)
                let flor = this.add.circle(0, -100, 35, colores[i]);
                let centro = this.add.circle(0, -100, 12, 0xffca28);
                
                // Texto del nombre
                let texto = this.add.text(0, 30, nombres[i], {
                    fontSize: '16px',
                    fill: '#fff',
                    align: 'center'
                }).setOrigin(0.5);
                
                container.add([tallo, flor, centro, texto]);
                flores.push({ 
                    obj: container, 
                    crecida: false,
                    rotada: false,
                    indice: i
                });
            }
            
            console.log("✅ Flores creadas:", flores.length);
        }

        function update() {
            if (!escena) return;
            
            // ✅ Efecto de agua: las flores crecen
            if (estado.agua > 20 && flores.length > 0) {
                flores.forEach(f => {
                    if(!f.crecida) {
                        escena.tweens.add({ 
                            targets: f.obj, 
                            scale: 1.5, 
                            duration: 800, 
                            ease: 'Bounce.easeOut'
                        });
                        f.crecida = true;
                        console.log("🌸 Flor " + (f.indice + 1) + " creció!");
                    }
                });
                estado.agua = 0; // Reset
            }
            
            // ✅ Efecto de sol: las flores brillan y rotan
            if (estado.sol > 20 && flores.length > 0) {
                flores.forEach(f => {
                    if(!f.rotada) {
                        escena.tweens.add({ 
                            targets: f.obj, 
                            angle: 10,
                            alpha: 0.8,
                            duration: 600,
                            yoyo: true,
                            repeat: 2
                        });
                        f.rotada = true;
                    }
                });
                estado.sol = 0; // Reset
            }
        }

        function accion(tipo) {
            if(tipo === 'agua') {
                estado.agua += 25;
                console.log("💧 ¡Regando! Agua acumulada:", estado.agua);
                if(escena) escena.cameras.main.flash(300, 100, 150, 255);
            }
            if(tipo === 'sol') {
                estado.sol += 25;
                console.log("☀️ ¡Sol! Sol acumulado:", estado.sol);
                if(escena) escena.cameras.main.flash(300, 255, 200, 100);
            }
            if(tipo === 'abono') {
                estado.abono += 25;
                console.log("🌿 ¡Abono! Abono acumulado:", estado.abono);
                if(escena) escena.cameras.main.flash(300, 100, 255, 100);
            }
        }
    </script>
</body>
</html>
