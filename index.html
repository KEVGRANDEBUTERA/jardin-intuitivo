<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jardín Intuitivo</title>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #2e7d32 url('jardin1.jpeg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: -1;
        }
        .petalo {
            position: fixed;
            top: -50px; width: 30px; height: 30px;
            background: url('petalo.png') no-repeat center;
            background-size: contain;
            pointer-events: none;
            animation: caer linear infinite;
            z-index: 100;
        }
        @keyframes caer {
            0% { transform: translateY(0px) rotate(0deg) translateX(0px); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg) translateX(-20px); opacity: 0; }
        }
        #ui-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #game-container {
            width: 800px;
            height: 500px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 5px solid white;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .controles { margin-top: 20px; z-index: 200; }
        button {
            padding: 15px 25px; margin: 10px;
            border-radius: 50px; border: 2px solid white;
            background: #2e7d32; color: white;
            font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.1); background: #388e3c; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="game-container"></div>
        <div class="controles">
            <button onclick="enviarAccion('agua')">💧 Regar</button>
            <button onclick="enviarAccion('sol')">☀️ Sol</button>
            <button onclick="enviarAccion('abono')">🌿 Abono</button>
        </div>
    </div>

    <script>
        // Partículas de hojas
        setInterval(() => {
            let p = document.createElement("div");
            p.classList.add("petalo");
            p.style.left = Math.random() * window.innerWidth + "px";
            p.style.animationDuration = (4 + Math.random() * 6) + "s";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 9000);
        }, 600);

        // LÓGICA DEL JUEGO
        var estadoGlobal = { agua: 0, sol: 0, abono: 0 };
        var listaPlantas = [];

        class Flor {
            constructor(scene, x, y, tipo, color) {
                this.scene = scene;
                this.estado = "normal";
                this.container = scene.add.container(x, y);

                // Tallo
                this.tallo = scene.add.rectangle(0, 0, 15, 120, 0x388e3c).setOrigin(0.5, 1);
                this.container.add(this.tallo);

                // Flor (Círculos para pétalos)
                this.petalos = [];
                for (let i = 0; i < 6; i++) {
                    let p = scene.add.circle(0, -120, 25, color).setOrigin(0.5, 1.8);
                    p.setRotation(i * (Math.PI / 3));
                    this.container.add(p);
                    this.petalos.push(p);
                }
                this.centro = scene.add.circle(0, -120, 15, 0xffca28);
                this.container.add(this.centro);
                
                this.container.setScale(1.1);
            }

            actualizar(estado) {
                if ((estado.agua > 20 || estado.abono > 20) && this.estado === "normal") {
                    this.estado = "grande";
                    this.scene.tweens.add({ targets: this.container, scale: 1.6, duration: 800, ease: 'Back.easeOut' });
                }
                if (estado.sol > 40 && this.estado !== "marchita") {
                    this.estado = "marchita";
                    this.tallo.setFillStyle(0x5d4037);
                    this.petalos.forEach(p => p.setFillStyle(0x3e2723));
                }
            }
        }

        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: 800, height: 500,
            transparent: true,
            scene: {
                create: function() {
                    window.escena = this;
                    listaPlantas.push(new Flor(this, 200, 450, "diente", 0xffff00));
                    listaPlantas.push(new Flor(this, 400, 450, "tomate", 0xff4444));
                    listaPlantas.push(new Flor(this, 600, 450, "cactus", 0xff44ff));
                },
                update: function() {
                    listaPlantas.forEach(p => p.actualizar(estadoGlobal));
                }
            }
        };

        const game = new Phaser.Game(config);

        function enviarAccion(tipo) {
            if (tipo === 'agua') {
                estadoGlobal.agua += 5;
                // Efecto visual rápido
                window.escena.cameras.main.flash(200, 100, 200, 255);
            }
            if (tipo === 'sol') estadoGlobal.sol += 5;
            if (tipo === 'abono') estadoGlobal.abono += 5;
            console.log(estadoGlobal);
        }
    </script>
</body>
</html>
